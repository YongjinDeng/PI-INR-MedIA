# PI-INR Configuration File

# Data paths
data:
  root: "./data/Pancreatic-CT-CBCT-SEG"
  target_spacing: [2.0, 1.0, 1.0]  # (z, y, x) in mm

# Training parameters
training:
  batch_points: 15000
  epochs: 1200
  learning_rate: 0.0002
  random_seed: 42
  device: "cuda"  # or "cpu"
  gradient_clip: 1.0

# Loss weights
loss_weights:
  lambda_edl: 1.0
  lambda_phys: 0.05
  lambda_fold: 10.0
  gamma_metric: 10.0

# Thresholds
thresholds:
  ati_threshold: 0.6
  uncertainty_percentile: 85

# Output
output:
  result_dir: "./results/MedIA_Ultimate_Run"
  save_interval: 5
  force_rerun: true
  delete_old_results: false