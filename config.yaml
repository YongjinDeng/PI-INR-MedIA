# PI-INR Configuration File
# Version: 1.0.0

# Data paths
data:
  root: "./data/Pancreatic-CT-CBCT-SEG"
  target_spacing: [2.0, 1.0, 1.0]  # (z, y, x) in mm

# Training parameters
training:
  batch_points: 25000
  epochs: 1500
  learning_rate: 0.0005
  omega_0: 20.0
  random_seed: 42
  device: "cuda"  # or "cpu"
  gradient_clip: 1.0

# Loss weights
loss_weights:
  lambda_edl: 1.0
  lambda_edge: 5.0
  lambda_smooth: 0.1
  lambda_phys: 0.2
  lambda_fold_init: 0.1
  lambda_fold_max: 5.0
  gamma_metric: 10.0

# Evaluation
evaluation:
  run_baseline: true
  compute_dsc: true
  ati_threshold: 0.6
  ati_smooth_sigma: 1.0
  ati_calibration: true

# Output
output:
  result_dir: "./results/MedIA_Ultimate_Run_Final"
  save_interval: 5
  force_rerun: true
  save_metadata_json: true
